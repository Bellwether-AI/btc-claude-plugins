name: Sync plugin versions to marketplace.json

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/.claude-plugin/plugin.json'

jobs:
  sync-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync plugin versions to marketplace.json
        run: |
          CHANGED=false

          for PLUGIN in flywheel co-dwerker; do
            PLUGIN_JSON="plugins/$PLUGIN/.claude-plugin/plugin.json"
            if [ ! -f "$PLUGIN_JSON" ]; then
              echo "Skipping $PLUGIN — no plugin.json found"
              continue
            fi

            PLUGIN_VERSION=$(jq -r ".version" "$PLUGIN_JSON")
            MARKETPLACE_VERSION=$(jq -r ".plugins[] | select(.name == \"$PLUGIN\") | .version" .claude-plugin/marketplace.json)

            if [ "$PLUGIN_VERSION" = "$MARKETPLACE_VERSION" ]; then
              echo "$PLUGIN: versions already match ($PLUGIN_VERSION)"
            else
              echo "$PLUGIN: updating marketplace.json $MARKETPLACE_VERSION -> $PLUGIN_VERSION"
              jq --arg ver "$PLUGIN_VERSION" --arg name "$PLUGIN" '(.plugins[] | select(.name == $name)).version = $ver' .claude-plugin/marketplace.json > tmp.json
              mv tmp.json .claude-plugin/marketplace.json
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
        id: sync

      - name: Commit and push
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: sync plugin versions to marketplace.json"
          git push

