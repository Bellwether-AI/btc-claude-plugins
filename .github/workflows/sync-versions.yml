name: Sync plugin versions to marketplace.json

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/.claude-plugin/plugin.json'

jobs:
  sync-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync flywheel version to marketplace.json
        run: |
          PLUGIN_VERSION=$(jq -r ".version" plugins/flywheel/.claude-plugin/plugin.json)
          MARKETPLACE_VERSION=$(jq -r ".plugins[] | select(.name == \"flywheel\") | .version" .claude-plugin/marketplace.json)

          if [ "$PLUGIN_VERSION" = "$MARKETPLACE_VERSION" ]; then
            echo "Versions already match ($PLUGIN_VERSION) — nothing to do"
            exit 0
          fi

          echo "Updating marketplace.json: $MARKETPLACE_VERSION -> $PLUGIN_VERSION"
          jq --arg ver "$PLUGIN_VERSION" '(.plugins[] | select(.name == "flywheel")).version = $ver' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: sync flywheel plugin version to $(jq -r .version plugins/flywheel/.claude-plugin/plugin.json)"
          git push

